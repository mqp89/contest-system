<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>学科竞赛管理系统</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.9.7/dist/index.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;color:#303133;background:#f5f7fa}
.layout{height:100vh;display:flex;overflow:hidden}
.layout-aside{width:220px;background:#1d1e2c;transition:width .3s;overflow:hidden;display:flex;flex-direction:column}
.sidebar-logo{height:56px;display:flex;align-items:center;justify-content:center;color:#409eff;gap:8px;border-bottom:1px solid rgba(255,255,255,.08);font-size:16px;font-weight:600}
.layout-main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.layout-header{height:56px;background:#fff;border-bottom:1px solid #e4e7ed;display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 2px 4px rgba(0,0,0,.05);flex-shrink:0}
.layout-main{flex:1;background:#f5f7fa;overflow-y:auto;padding:20px}
.layout-footer{height:36px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#999;background:#fff;border-top:1px solid #e4e7ed;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.header-right{display:flex;align-items:center;gap:20px}
.user-info{display:flex;align-items:center;gap:8px;cursor:pointer}
.stat-card{border-top:3px solid;margin-bottom:16px}
.login-page,.register-page{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:40px 20px}
.login-bg{position:fixed;inset:0;background:linear-gradient(135deg,#1d1e2c,#2d3a5c 50%,#409eff)}
.register-bg{position:fixed;inset:0;background:linear-gradient(135deg,#1d1e2c,#2d5a3c 50%,#67c23a)}
.login-card,.register-card{position:relative;width:420px;max-width:100%;background:#fff;border-radius:12px;padding:40px 36px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.register-card{width:520px}
.login-header,.register-header{text-align:center;margin-bottom:28px}
.login-header h1,.register-header h1{font-size:22px;color:#303133;margin:10px 0 4px}
.login-header p,.register-header p{font-size:13px;color:#909399}
.login-footer,.register-footer{text-align:center;font-size:13px;color:#909399;display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.captcha-row{display:flex;gap:12px}
.captcha-img{width:120px;height:40px;background:#f0f2f5;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;letter-spacing:6px;color:#409eff;cursor:pointer;user-select:none;font-style:italic;flex-shrink:0}
.login-btn,.register-btn{width:100%}
.form-tip{font-size:12px;color:#c0c4cc;margin-top:4px}
.card-header{display:flex;justify-content:space-between;align-items:center}
.demo-accounts{margin-top:16px}
.exam-page{position:fixed;inset:0;background:#f5f7fa;display:flex;flex-direction:column;z-index:100}
.exam-header{height:56px;background:#fff;border-bottom:1px solid #e4e7ed;display:flex;align-items:center;padding:0 20px;gap:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.exam-body{flex:1;display:flex;overflow:hidden}
.answer-sheet{width:180px;background:#fff;border-right:1px solid #e4e7ed;padding:16px;overflow-y:auto}
.sheet-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.sheet-item{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border:1px solid #dcdfe6;border-radius:4px;font-size:13px;cursor:pointer}
.sheet-item.answered{background:#ecf5ff;border-color:#409eff;color:#409eff}
.sheet-item.current{background:#409eff;border-color:#409eff;color:#fff}
.question-area{flex:1;overflow-y:auto;padding:24px 32px}
.question-stem{font-size:16px;line-height:1.8;margin-bottom:24px;color:#303133}
.option-item{padding:10px 14px;border:1px solid #e4e7ed;border-radius:6px;margin-bottom:8px}
.option-item:hover{border-color:#409eff;background:#f0f7ff}
.question-nav{display:flex;justify-content:space-between;margin-top:32px;padding-top:20px;border-top:1px solid #ebeef5}
.notice-item{display:flex;gap:10px;padding:10px 6px;border-bottom:1px solid #ebeef5;cursor:pointer;border-radius:4px}
.notice-item:hover{background:#f5f7fa}
.grade-question{border:1px solid #e4e7ed;border-radius:8px;padding:16px;margin-bottom:16px}
.answer-content{padding:10px 12px;background:#f0f9eb;border-radius:4px;font-size:14px;line-height:1.6;margin:8px 0}
.answer-content.ref{background:#fdf6ec}
.student-answer .answer-label,.reference-answer .answer-label{font-size:13px;color:#909399;margin-bottom:4px}
.score-input{display:flex;align-items:center;gap:6px;margin-top:12px}
.menu-icon{width:20px;text-align:center;display:inline-block;margin-right:8px}
@media(max-width:768px){.layout-aside{width:0!important}.layout-main{padding:12px}.answer-sheet{width:120px}.login-card,.register-card{padding:24px 20px}}

/* Loading遮罩 */
#app-loading{position:fixed;inset:0;background:#1d1e2c;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
#app-loading .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#409eff;border-radius:50%;animation:spin 1s linear infinite}
#app-loading p{color:#909399;margin-top:16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<script>setTimeout(function(){var el=document.getElementById('app-loading');if(el&&el.style.display!=='none'){el.innerHTML='<p style="color:#f56c6c;font-size:16px">加载超时<br><small>请检查网络连接后重试 (Ctrl+Shift+R)</small></p>';}},10000);</script>
<div id="app-loading"><div class="spinner"></div><p>系统加载中...</p></div>
<div id="app"><router-view></router-view></div>

<script type="text/x-template" id="tmpl-login">
<div class="login-page"><div class="login-bg"></div><div class="login-card">
  <div class="login-header"><h1>学科竞赛管理系统</h1><p>学校学科竞赛一站式管理平台</p></div>
  <el-form :model="form" :rules="rules" size="large" ref="formRef" @submit.prevent="handleLogin">
    <el-form-item prop="username"><el-input v-model="form.username" placeholder="学号/工号" /></el-form-item>
    <el-form-item prop="password"><el-input v-model="form.password" type="password" placeholder="密码" show-password @keyup.enter="handleLogin"/></el-form-item>
    <el-form-item prop="captcha"><div class="captcha-row"><el-input v-model="form.captcha" placeholder="验证码"/><div class="captcha-img" @click="refreshCaptcha">{{captchaText}}</div></div></el-form-item>
    <el-form-item><el-button type="primary" :loading="loading" class="login-btn" @click="handleLogin">{{loading?'登录中...':'登 录'}}</el-button></el-form-item>
  </el-form>
  <div class="login-footer"><a href="javascript:void(0)" @click="$router.push('/register')" style="color:#409eff">没有账号？立即注册</a><span>|</span><a href="javascript:void(0)" style="color:#409eff">忘记密码</a></div>
  <div class="demo-accounts"><el-divider>演示账号</el-divider>
    <el-table :data="[{r:'学生',u:'2024001001',p:'123456'},{r:'教师',u:'T20230001',p:'123456'},{r:'管理员',u:'admin',p:'admin123'}]" size="small" stripe>
      <el-table-column prop="r" label="角色" width="70"/><el-table-column prop="u" label="账号" width="140"/><el-table-column prop="p" label="密码" width="100"/>
    </el-table>
  </div>
</div></div>
</script>

<script type="text/x-template" id="tmpl-register">
<div class="register-page"><div class="register-bg"></div><div class="register-card">
  <div class="register-header"><h1>注册账号</h1><p>学科竞赛管理系统 · 仅限本校师生</p></div>
  <el-form :model="form" :rules="rules" size="default" label-width="90px" ref="formRef">
    <el-form-item label="真实姓名" prop="realName"><el-input v-model="form.realName" placeholder="2-10个中文汉字" maxlength="10"/></el-form-item>
    <el-form-item label="学号/工号" prop="username"><el-input v-model="form.username" placeholder="学号如2024001001，工号如T20230001" maxlength="20"/></el-form-item>
    <el-form-item label="身份" prop="role"><el-radio-group v-model="form.role"><el-radio value="student">我是学生</el-radio><el-radio value="teacher">我是教师</el-radio></el-radio-group></el-form-item>
    <el-form-item label="所属院系" prop="deptId"><el-select v-model="form.deptId" placeholder="请选择院系" style="width:100%"><el-option v-for="d in depts" :key="d.id" :label="d.name" :value="d.id"/></el-select></el-form-item>
    <el-form-item label="班级" prop="className" v-if="form.role==='student'"><el-input v-model="form.className" placeholder="如：数学2201班"/></el-form-item>
    <el-form-item label="手机号" prop="phone"><el-input v-model="form.phone" placeholder="11位手机号" maxlength="11"/></el-form-item>
    <el-form-item label="登录密码" prop="password"><el-input v-model="form.password" type="password" placeholder="6-16位，含字母和数字" show-password maxlength="16"/></el-form-item>
    <el-form-item label="确认密码" prop="confirmPwd"><el-input v-model="form.confirmPwd" type="password" placeholder="再次输入密码" show-password maxlength="16"/></el-form-item>
    <el-form-item label="邀请码" prop="inviteCode"><el-input v-model="form.inviteCode" placeholder="学校注册邀请码" maxlength="10"/><div class="form-tip">演示邀请码：SCHOOL2026 / CONTEST2026 / ACM2026</div></el-form-item>
    <el-form-item prop="agree"><el-checkbox v-model="form.agree">我已阅读并同意《用户协议》和《隐私政策》</el-checkbox></el-form-item>
    <el-form-item><el-button type="primary" :loading="loading" class="register-btn" @click="handleRegister">{{loading?'注册中...':'注 册'}}</el-button></el-form-item>
  </el-form>
  <div class="register-footer"><span>已有账号？</span><a href="javascript:void(0)" @click="$router.push('/login')" style="color:#409eff">立即登录</a></div>
</div></div>
</script>

<script type="text/x-template" id="tmpl-layout">
<div class="layout">
  <div class="layout-aside" :style="{width:isCollapse?'64px':'220px'}">
    <div class="sidebar-logo"><span style="font-size:20px">🏆</span> <span v-show="!isCollapse">学科竞赛管理</span></div>
    <el-menu :default-active="route.path" :collapse="isCollapse" background-color="#1d1e2c" text-color="#a6a7b3" active-text-color="#409eff" router>
      <template v-if="role==='student'">
        <el-menu-item index="/student/dashboard"><span class="menu-icon">📊</span><span>首页看板</span></el-menu-item>
        <el-menu-item index="/student/contests"><span class="menu-icon">📋</span><span>竞赛列表</span></el-menu-item>
        <el-menu-item index="/student/results"><span class="menu-icon">🏆</span><span>我的成绩</span></el-menu-item>
        <el-menu-item index="/student/certificates"><span class="menu-icon">🏅</span><span>电子证书</span></el-menu-item>
        <el-menu-item index="/student/notices"><span class="menu-icon">🔔</span><span>公告通知</span></el-menu-item>
      </template>
      <template v-if="role==='teacher'">
        <el-menu-item index="/teacher/dashboard"><span class="menu-icon">📊</span><span>首页看板</span></el-menu-item>
        <el-menu-item index="/teacher/contests"><span class="menu-icon">✏️</span><span>竞赛管理</span></el-menu-item>
        <el-menu-item index="/teacher/questions"><span class="menu-icon">📄</span><span>题库管理</span></el-menu-item>
        <el-menu-item index="/teacher/grading"><span class="menu-icon">✅</span><span>主观题阅卷</span></el-menu-item>
        <el-menu-item index="/teacher/results"><span class="menu-icon">📈</span><span>成绩管理</span></el-menu-item>
      </template>
      <template v-if="role==='admin'">
        <el-menu-item index="/admin/dashboard"><span class="menu-icon">📊</span><span>首页看板</span></el-menu-item>
        <el-menu-item index="/admin/users"><span class="menu-icon">👤</span><span>用户管理</span></el-menu-item>
        <el-menu-item index="/admin/dept"><span class="menu-icon">🏢</span><span>院系班级</span></el-menu-item>
        <el-menu-item index="/admin/contests"><span class="menu-icon">🏆</span><span>竞赛总览</span></el-menu-item>
        <el-menu-item index="/admin/statistics"><span class="menu-icon">📈</span><span>数据统计</span></el-menu-item>
        <el-menu-item index="/admin/system"><span class="menu-icon">⚙️</span><span>系统配置</span></el-menu-item>
      </template>
    </el-menu>
  </div>
  <div class="layout-main-wrap">
    <div class="layout-header">
      <div class="header-left">
        <span style="cursor:pointer;font-size:18px" @click="isCollapse=!isCollapse">{{isCollapse?'☰':'✕'}}</span>
        <span style="font-size:13px;color:#909399">🏠 / {{route.meta.title||'首页'}}</span>
      </div>
      <div class="header-right">
        <el-dropdown trigger="click" @command="handleCmd">
          <div class="user-info"><span style="font-size:18px">👤</span><span>{{userName}}</span><el-tag size="small" :type="role==='admin'?'danger':role==='teacher'?'warning':'success'">{{roleLabel}}</el-tag></div>
          <template #dropdown><el-dropdown-menu>
            <el-dropdown-item command="pwd">🔒 修改密码</el-dropdown-item>
            <el-dropdown-item divided command="logout">🚪 退出登录</el-dropdown-item>
          </el-dropdown-menu></template>
        </el-dropdown>
      </div>
    </div>
    <div class="layout-main"><router-view></router-view></div>
    <div class="layout-footer">学科竞赛管理系统 v1.0 © 2026</div>
  </div>
</div>
</script>

<script type="text/x-template" id="tmpl-student-dashboard">
<div>
  <el-row :gutter="20"><el-col :xs="12" :sm="6" v-for="c in cards" :key="c.label"><el-card shadow="hover" class="stat-card" :style="{borderTopColor:c.color}"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:28px;font-weight:700">{{c.value}}</div><div style="font-size:13px;color:#909399;margin-top:4px">{{c.label}}</div></div><span style="font-size:32px">{{c.icon}}</span></div></el-card></el-col></el-row>
  <el-row :gutter="20" style="margin-top:20px">
    <el-col :xs="24" :md="14"><el-card shadow="hover"><template #header><div class="card-header"><span>近期竞赛</span><a href="javascript:void(0)" @click="$router.push('/student/contests')" style="color:#409eff;font-size:13px">查看全部</a></div></template>
      <el-table :data="contests" stripe><el-table-column prop="name" label="竞赛名称" min-width="180"/><el-table-column prop="cat" label="学科" width="80"><template #default="s"><el-tag size="small">{{s.row.cat}}</el-tag></template></el-table-column><el-table-column prop="status" label="状态" width="100"><template #default="s"><el-tag :type="s.row.sType" size="small">{{s.row.status}}</el-tag></template></el-table-column><el-table-column label="操作" width="80"><template #default="s"><el-button size="small" type="primary" link @click="$router.push('/student/contest/'+s.row.id)">查看</el-button></template></el-table-column></el-table>
    </el-card></el-col>
    <el-col :xs="24" :md="10"><el-card shadow="hover"><template #header><span>公告通知</span></template>
      <div v-for="n in notices" :key="n.id" class="notice-item"><span>🔔</span><div><div style="font-size:14px;color:#303133">{{n.title}}</div><div style="font-size:12px;color:#c0c4cc">{{n.time}}</div></div></div>
    </el-card></el-col>
  </el-row>
</div>
</script>

<script type="text/x-template" id="tmpl-contest-list">
<div>
  <el-card shadow="never" style="margin-bottom:20px">
    <el-row :gutter="12">
      <el-col :xs="24" :sm="6"><el-input v-model="kw" placeholder="搜索竞赛" clearable/></el-col>
      <el-col :xs="12" :sm="4"><el-select v-model="cat" placeholder="学科" clearable style="width:100%"><el-option v-for="c in cats" :key="c" :label="c" :value="c"/></el-select></el-col>
      <el-col :xs="12" :sm="4"><el-select v-model="st" placeholder="状态" clearable style="width:100%"><el-option label="报名中" value="reg"/><el-option label="进行中" value="on"/><el-option label="已结束" value="end"/></el-select></el-col>
      <el-col :xs="24" :sm="4"><el-button type="primary" @click="search">搜索</el-button></el-col>
    </el-row>
  </el-card>
  <el-row :gutter="20">
    <el-col :xs="24" :sm="12" :md="8" v-for="c in list" :key="c.id" style="margin-bottom:20px">
      <el-card shadow="hover" style="cursor:pointer" @click="$router.push('/student/contest/'+c.id)">
        <div style="display:flex;gap:8px;margin-bottom:12px"><el-tag :type="c.sType" size="small">{{c.status}}</el-tag><el-tag type="info" size="small">{{c.mode}}</el-tag></div>
        <h3 style="font-size:16px;margin:0 0 8px">{{c.name}}</h3>
        <p style="font-size:13px;color:#909399;margin:0 0 12px">{{c.dept}} · {{c.cat}}</p>
        <div style="font-size:13px;color:#606266;line-height:1.8">📅 报名截止：{{c.signEnd}}<br>⏱ 比赛时间：{{c.date}}<br>👤 已报名：{{c.count}}/{{c.max}}</div>
        <div style="text-align:right;margin-top:12px"><el-button type="primary" size="small">{{c.signed?'已报名':'查看详情'}}</el-button></div>
      </el-card>
    </el-col>
  </el-row>
  <el-pagination v-if="total>9" style="justify-content:center;margin-top:16px" layout="prev,pager,next,total" :total="total" :page-size="9" v-model:current-page="page"/>
</div>
</script>

<script type="text/x-template" id="tmpl-contest-detail">
<a :href="'#/student/exam/'+c.id+'/1'" target="_blank" style="display:none" ref="examLink"></a>
<div>
  <el-card shadow="never">
    <template #header><div style="display:flex;align-items:center;gap:8px"><a href="javascript:void(0)" @click="$router.back()" style="color:#409eff;font-size:14px">← 返回</a><span style="font-size:18px">{{c.name}}</span></div></template>
    <el-descriptions :column="2" border>
      <el-descriptions-item label="竞赛名称">{{c.name}}</el-descriptions-item>
      <el-descriptions-item label="学科分类"><el-tag>{{c.cat}}</el-tag></el-descriptions-item>
      <el-descriptions-item label="主办院系">{{c.dept}}</el-descriptions-item>
      <el-descriptions-item label="参赛模式">{{c.mode}}</el-descriptions-item>
      <el-descriptions-item label="报名截止">{{c.signEnd}}</el-descriptions-item>
      <el-descriptions-item label="比赛时间">{{c.date}}</el-descriptions-item>
      <el-descriptions-item label="考试时长">{{c.duration}}分钟</el-descriptions-item>
      <el-descriptions-item label="已报名/上限">{{c.count}}/{{c.max}}人</el-descriptions-item>
      <el-descriptions-item label="状态"><el-tag :type="c.sType">{{c.status}}</el-tag></el-descriptions-item>
    </el-descriptions>
    <div style="margin:24px 0"><h4 style="margin-bottom:12px">竞赛说明</h4><p style="color:#606266;line-height:1.8">{{c.desc}}</p></div>
    <div style="text-align:center;margin-top:24px">
      <template v-if="c.canSign&&!c.signed">
        <template v-if="c.mode==='团队赛'">
          <el-radio-group v-model="signMode" style="margin-bottom:12px"><el-radio value="create">创建队伍</el-radio><el-radio value="join">加入队伍</el-radio></el-radio-group><br>
          <div v-if="signMode==='create'" style="display:inline-flex;gap:8px"><el-input v-model="teamName" placeholder="队伍名称" style="width:180px"/><el-button type="primary" @click="doSign">创建队伍并报名</el-button></div>
          <div v-else style="display:inline-flex;gap:8px"><el-input v-model="inviteCode" placeholder="邀请码" style="width:180px"/><el-button type="success" @click="doJoin">加入队伍</el-button></div>
        </template>
        <el-button v-else type="primary" size="large" @click="doSign">立即报名</el-button>
      </template>
      <el-tag v-else-if="c.signed" type="success" size="large">已报名</el-tag>
      <el-tag v-else type="info" size="large">报名已截止</el-tag>
    </div>
    <div style="text-align:center;margin-top:16px" v-if="c.signed&&c.statusText==='进行中'">
      <el-button type="danger" size="large" @click="$router.push('/student/exam/'+c.id+'/1')">进入考试</el-button>
    </div>
  </el-card>
</div>
</script>

<script type="text/x-template" id="tmpl-exam">
<div class="exam-page">
  <div class="exam-header"><div style="font-size:16px;font-weight:600;flex:1">{{paper.name}}</div><div style="display:flex;align-items:center;gap:6px;font-size:18px;font-weight:700;color:#409eff">⏱ {{timeStr}}</div><el-button type="danger" plain size="small" @click="doSubmit">交卷</el-button></div>
  <div class="exam-body">
